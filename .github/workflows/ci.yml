name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run lint
      - run: npm test
      - run: npm run build

  dapp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run build

  hardhat:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hardhat
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run compile
